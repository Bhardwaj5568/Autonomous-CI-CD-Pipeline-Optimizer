# ==============================================================================
# GitHub Actions Workflow: Optimizer Webhook Bridge
# ==============================================================================
#
# Purpose:
#   Bridge GitHub Actions workflow events to an external CI/CD Optimizer service.
#   Sends structured event payloads for analysis, scoring, and recommendations.
#
# Triggers:
#   - workflow_dispatch: Manual trigger from GitHub Actions UI
#   - push to main/test-integration: Automatic on code push
#
# Security:
#   - HMAC-SHA256 signature on webhook payload (prevents spoofing)
#   - API key authentication (prevents unauthorized access)
#   - Role-based access control (operator role)
#   - URL/path validation (prevents injection attacks)
#
# Configuration:
#   Set these secrets in GitHub repo settings:
#   - OPTIMIZER_BASE_URL: Base URL of optimizer (e.g., https://optimizer.internal)
#   - OPTIMIZER_API_KEY: Authentication token for /webhooks/github-actions
#   - OPTIMIZER_ROLE: Role for RBAC (typically "operator")
#   - OPTIMIZER_WEBHOOK_PATH: Webhook path (e.g., "/webhooks/github-actions")
#   - OPTIMIZER_WEBHOOK_SECRET: Secret for HMAC signature (optional but recommended)
#
# ==============================================================================

name: Optimizer Webhook Bridge

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - test-integration

jobs:
  send-to-optimizer:
    runs-on: ubuntu-latest
    steps:
      # ========================================================================
      # STEP: Send workflow event to optimizer
      # ========================================================================
      # This step constructs a JSON payload from GitHub context variables,
      # validates it, computes HMAC signature, and sends to the optimizer service.
      # ========================================================================
      - name: Send workflow event to optimizer
        env:
          # Required secrets (validate presence before proceeding)
          OPTIMIZER_BASE_URL: ${{ secrets.OPTIMIZER_BASE_URL }}
          OPTIMIZER_API_KEY: ${{ secrets.OPTIMIZER_API_KEY }}
          OPTIMIZER_ROLE: ${{ secrets.OPTIMIZER_ROLE }}
          OPTIMIZER_WEBHOOK_PATH: ${{ secrets.OPTIMIZER_WEBHOOK_PATH }}
          
          # Optional but recommended secret (improves security)
          OPTIMIZER_WEBHOOK_SECRET: ${{ secrets.OPTIMIZER_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          # ====================================================================
          # SECTION 1: Validate Required Secrets
          # ====================================================================
          # Ensure all critical configuration is present before proceeding
          if [ -z "${OPTIMIZER_BASE_URL}" ] || [ -z "${OPTIMIZER_API_KEY}" ] || [ -z "${OPTIMIZER_ROLE}" ] || [ -z "${OPTIMIZER_WEBHOOK_PATH}" ]; then
            echo "❌ ERROR: Required secret missing. Configure these in GitHub repo settings:"
            echo "   - OPTIMIZER_BASE_URL"
            echo "   - OPTIMIZER_API_KEY"
            echo "   - OPTIMIZER_ROLE"
            echo "   - OPTIMIZER_WEBHOOK_PATH"
            exit 1
          fi

          # ====================================================================
          # SECTION 2: Sanitize Secrets (Remove Quotes/Newlines/Spaces)
          # ====================================================================
          # GitHub Actions secrets can accidentally include whitespace, quotes,
          # or newlines when copy-pasted. This causes malformed URLs and 401 errors.
          # We normalize by trimming whitespace and stripping a single outer pair of quotes.
          OPTIMIZER_BASE_URL_CLEAN=$(printf '%s' "${OPTIMIZER_BASE_URL}" | tr -d '\r\n' | xargs)
          OPTIMIZER_BASE_URL_CLEAN="${OPTIMIZER_BASE_URL_CLEAN#\"}"
          OPTIMIZER_BASE_URL_CLEAN="${OPTIMIZER_BASE_URL_CLEAN%\"}"
          OPTIMIZER_BASE_URL_CLEAN="${OPTIMIZER_BASE_URL_CLEAN#\'}"
          OPTIMIZER_BASE_URL_CLEAN="${OPTIMIZER_BASE_URL_CLEAN%\'}"

          OPTIMIZER_WEBHOOK_PATH_CLEAN=$(printf '%s' "${OPTIMIZER_WEBHOOK_PATH}" | tr -d '\r\n' | xargs)
          OPTIMIZER_WEBHOOK_PATH_CLEAN="${OPTIMIZER_WEBHOOK_PATH_CLEAN#\"}"
          OPTIMIZER_WEBHOOK_PATH_CLEAN="${OPTIMIZER_WEBHOOK_PATH_CLEAN%\"}"
          OPTIMIZER_WEBHOOK_PATH_CLEAN="${OPTIMIZER_WEBHOOK_PATH_CLEAN#\'}"
          OPTIMIZER_WEBHOOK_PATH_CLEAN="${OPTIMIZER_WEBHOOK_PATH_CLEAN%\'}"

          # ====================================================================
          # SECTION 3: URL Format Validation
          # ====================================================================
          # Validate base URL is HTTP(S) - prevents curl errors and injection attacks
          if [[ ! "${OPTIMIZER_BASE_URL_CLEAN}" =~ ^https?:// ]]; then
            echo "Invalid OPTIMIZER_BASE_URL. Expected http(s) URL, got malformed value."
            exit 1
          fi

          # Validate webhook path is absolute (starts with /) - ensures proper URL construction
          if [[ "${OPTIMIZER_WEBHOOK_PATH_CLEAN}" != /* ]]; then
            echo "Invalid OPTIMIZER_WEBHOOK_PATH. It must start with '/'."
            exit 1
          fi

          # ====================================================================
          # SECTION 4: Build Target URLs and Delivery Tracking ID
          # ====================================================================
          # Combine base URL + webhook path (remove trailing slash from base URL)
          TARGET_URL="${OPTIMIZER_BASE_URL_CLEAN%/}${OPTIMIZER_WEBHOOK_PATH_CLEAN}"
          
          # Health check endpoint - verifies optimizer service is running
          HEALTH_URL="${OPTIMIZER_BASE_URL_CLEAN%/}/health"
          
          # Unique ID for this webhook delivery (used for duplicate detection)
          DELIVERY_ID="gh-bridge-${{ github.run_id }}-${{ github.run_attempt }}"
          
          # Branch/tag name for tracking in logs
          WORKFLOW_REF="${{ github.ref_name }}"

          # ====================================================================
          # SECTION 5: Health Check - Verify Optimizer Service is Running
          # ====================================================================
          # Before sending the webhook payload, verify the optimizer service is healthy
          # This prevents queueing messages that will fail on delivery
          echo "🔍 Checking optimizer health endpoint: ${HEALTH_URL}"
          : > /tmp/optimizer_health.txt
          
          # Send GET request to health endpoint with 30-second timeout
          # Capture HTTP status code and response body
          HEALTH_STATUS=$(curl --silent --show-error --output /tmp/optimizer_health.txt --write-out "%{http_code}" "$HEALTH_URL" || true)
          echo "📊 Health status: ${HEALTH_STATUS}"
          
          # Fail if health check did not return 200 OK
          if [ "${HEALTH_STATUS}" != "200" ]; then
            echo "❌ Health check failed. Response body:"
            cat /tmp/optimizer_health.txt || true
            exit 1
          fi

          # ====================================================================
          # SECTION 6: Construct Webhook Payload
          # ====================================================================
          # Build a JSON payload containing GitHub Actions context
          # This includes repository, branch, commit, workflow, and job information
          PAYLOAD=$(cat <<EOF
          {
            "repository": "${{ github.repository }}",
            "ref": "${WORKFLOW_REF}",
            "sha": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "workflow": "${{ github.workflow }}",
            "actor": "${{ github.actor }}",
            "event_name": "${{ github.event_name }}",
            "status": "completed",
            "conclusion": "success",
            "jobs": [
              {
                "name": "send-to-optimizer",
                "status": "completed",
                "conclusion": "success",
                "started_at": "${{ github.run_started_at }}",
                "completed_at": "${{ github.run_started_at }}"
              }
            ]
          }
          EOF
          )

          # ====================================================================
          # SECTION 7: Build curl Arguments for Webhook POST Request
          # ====================================================================
          # Construct an array of curl arguments for the webhook POST request
          CURL_ARGS=(
            --silent
            --show-error
            --output /tmp/optimizer_webhook_response.txt
            --write-out "%{http_code}"
            -X POST
            "$TARGET_URL"
            -H "Content-Type: application/json"
            -H "X-API-Key: ${OPTIMIZER_API_KEY}"
            -H "X-Role: ${OPTIMIZER_ROLE}"
            -H "X-GitHub-Delivery: ${DELIVERY_ID}"
            --data "$PAYLOAD"
          )

          # ====================================================================
          # SECTION 8: Add HMAC Signature (if Secret Configured)
          # ====================================================================
          # Compute HMAC-SHA256 signature if webhook secret is configured
          if [ -n "${OPTIMIZER_WEBHOOK_SECRET:-}" ]; then
            SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$OPTIMIZER_WEBHOOK_SECRET" -hex | awk '{print $2}')
            CURL_ARGS+=( -H "X-Hub-Signature-256: sha256=${SIGNATURE}" )
          fi

          # ====================================================================
          # SECTION 9: Send Webhook POST Request
          # ====================================================================
          HTTP_STATUS=$(curl "${CURL_ARGS[@]}")
          echo "✨ Webhook HTTP status: ${HTTP_STATUS}"

          # ====================================================================
          # SECTION 10: Validate HTTP Response
          # ====================================================================
          # Check that HTTP status is in the 2xx success range (200-299)
          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "❌ Webhook call failed. Response body:"
            cat /tmp/optimizer_webhook_response.txt || true
            exit 1
          fi

          echo "✅ Webhook sent to optimizer successfully. Response body:"
          cat /tmp/optimizer_webhook_response.txt || true
