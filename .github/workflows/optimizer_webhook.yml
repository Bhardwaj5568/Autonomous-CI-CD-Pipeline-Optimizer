# Sends workflow context to the optimizer webhook.
#
# Triggered on:
# - manual run
# - push to main
#
# Required secrets:
# - OPTIMIZER_BASE_URL
# - OPTIMIZER_API_KEY
# - OPTIMIZER_ROLE
# - OPTIMIZER_WEBHOOK_PATH
# Optional secret:
# - OPTIMIZER_WEBHOOK_SECRET

name: Optimizer Webhook Bridge

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  send-to-optimizer:
    runs-on: ubuntu-latest
    steps:
      # Build payload from GitHub runtime context and post it to optimizer.
      - name: Send workflow event to optimizer
        env:
          OPTIMIZER_BASE_URL: ${{ secrets.OPTIMIZER_BASE_URL }}
          OPTIMIZER_API_KEY: ${{ secrets.OPTIMIZER_API_KEY }}
          OPTIMIZER_ROLE: ${{ secrets.OPTIMIZER_ROLE }}
          OPTIMIZER_WEBHOOK_PATH: ${{ secrets.OPTIMIZER_WEBHOOK_PATH }}
          OPTIMIZER_WEBHOOK_SECRET: ${{ secrets.OPTIMIZER_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          # Validate required configuration.
          if [ -z "${OPTIMIZER_BASE_URL}" ] || [ -z "${OPTIMIZER_API_KEY}" ] || [ -z "${OPTIMIZER_ROLE}" ] || [ -z "${OPTIMIZER_WEBHOOK_PATH}" ]; then
            echo "ERROR: Required secret missing. Configure these in GitHub repo settings:"
            echo "  - OPTIMIZER_BASE_URL"
            echo "  - OPTIMIZER_API_KEY"
            echo "  - OPTIMIZER_ROLE"
            echo "  - OPTIMIZER_WEBHOOK_PATH"
            exit 1
          fi

          # Normalize values in case secret input includes quotes/newlines.
          OPTIMIZER_BASE_URL_CLEAN=$(printf '%s' "${OPTIMIZER_BASE_URL}" | tr -d '\r\n' | xargs)
          OPTIMIZER_BASE_URL_CLEAN="${OPTIMIZER_BASE_URL_CLEAN#\"}"
          OPTIMIZER_BASE_URL_CLEAN="${OPTIMIZER_BASE_URL_CLEAN%\"}"
          OPTIMIZER_BASE_URL_CLEAN="${OPTIMIZER_BASE_URL_CLEAN#\'}"
          OPTIMIZER_BASE_URL_CLEAN="${OPTIMIZER_BASE_URL_CLEAN%\'}"

          OPTIMIZER_WEBHOOK_PATH_CLEAN=$(printf '%s' "${OPTIMIZER_WEBHOOK_PATH}" | tr -d '\r\n' | xargs)
          OPTIMIZER_WEBHOOK_PATH_CLEAN="${OPTIMIZER_WEBHOOK_PATH_CLEAN#\"}"
          OPTIMIZER_WEBHOOK_PATH_CLEAN="${OPTIMIZER_WEBHOOK_PATH_CLEAN%\"}"
          OPTIMIZER_WEBHOOK_PATH_CLEAN="${OPTIMIZER_WEBHOOK_PATH_CLEAN#\'}"
          OPTIMIZER_WEBHOOK_PATH_CLEAN="${OPTIMIZER_WEBHOOK_PATH_CLEAN%\'}"

          # Basic URL checks.
          if [[ ! "${OPTIMIZER_BASE_URL_CLEAN}" =~ ^https?:// ]]; then
            echo "Invalid OPTIMIZER_BASE_URL. Expected an http(s) URL."
            exit 1
          fi

          if [[ "${OPTIMIZER_WEBHOOK_PATH_CLEAN}" != /* ]]; then
            echo "Invalid OPTIMIZER_WEBHOOK_PATH. It must start with '/'."
            exit 1
          fi

          # Compose endpoint URLs.
          TARGET_URL="${OPTIMIZER_BASE_URL_CLEAN%/}${OPTIMIZER_WEBHOOK_PATH_CLEAN}"
          HEALTH_URL="${OPTIMIZER_BASE_URL_CLEAN%/}/health"

          # Deterministic delivery id for dedupe on server side.
          DELIVERY_ID="gh-bridge-${{ github.run_id }}-${{ github.run_attempt }}"
          WORKFLOW_REF="${{ github.ref_name }}"
          COMPLETED_AT_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          if [ ! -f "$GITHUB_EVENT_PATH" ]; then
            echo "ERROR: GitHub event payload file was not found: $GITHUB_EVENT_PATH"
            exit 1
          fi

          EVENT_ACTION=$(jq -r '.action // ""' "$GITHUB_EVENT_PATH")
          PR_NUMBER=$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH")
          PR_TITLE=$(jq -r '.pull_request.title // empty' "$GITHUB_EVENT_PATH")
          PR_BASE_REF=$(jq -r '.pull_request.base.ref // empty' "$GITHUB_EVENT_PATH")
          PR_HEAD_REF=$(jq -r '.pull_request.head.ref // empty' "$GITHUB_EVENT_PATH")
          RELEASE_TAG=$(jq -r '.release.tag_name // empty' "$GITHUB_EVENT_PATH")
          RELEASE_NAME=$(jq -r '.release.name // empty' "$GITHUB_EVENT_PATH")
          RELEASE_PRERELEASE=$(jq -r '.release.prerelease // false' "$GITHUB_EVENT_PATH")
          RELEASE_PUBLISHED_AT=$(jq -r '.release.published_at // empty' "$GITHUB_EVENT_PATH")
          COMMIT_MESSAGE=$(jq -r '.head_commit.message // .workflow_run.head_commit.message // ""' "$GITHUB_EVENT_PATH")
          COMMIT_AUTHOR=$(jq -r '.head_commit.author.name // .head_commit.author.username // ""' "$GITHUB_EVENT_PATH")
          COMPARE_URL=$(jq -r '.compare // ""' "$GITHUB_EVENT_PATH")

          # Some events do not include default branch at top-level.
          DEFAULT_BRANCH=$(jq -r '.repository.default_branch // "main"' "$GITHUB_EVENT_PATH")

          # Health check before sending payload.
          echo "Checking optimizer health endpoint: ${HEALTH_URL}"
          : > /tmp/optimizer_health.txt

          BASE_HOST=$(printf '%s' "${OPTIMIZER_BASE_URL_CLEAN}" | sed -E 's#^https?://##; s#/.*$##')
          if [ -z "${BASE_HOST}" ]; then
            echo "Could not parse host from OPTIMIZER_BASE_URL."
            exit 1
          fi

          if ! getent hosts "${BASE_HOST}" >/dev/null 2>&1; then
            echo "DNS lookup failed for host: ${BASE_HOST}"
            echo "Tip: If you are using a trycloudflare tunnel, start a fresh tunnel and update OPTIMIZER_BASE_URL secret."
            exit 1
          fi

          HEALTH_STATUS="000"
          for attempt in 1 2 3 4 5; do
            HEALTH_STATUS=$(curl --silent --show-error --output /tmp/optimizer_health.txt --write-out "%{http_code}" "$HEALTH_URL" || true)
            echo "Health status attempt ${attempt}: ${HEALTH_STATUS}"
            if [ "${HEALTH_STATUS}" = "200" ]; then
              break
            fi
            sleep 5
          done

          if [ "${HEALTH_STATUS}" != "200" ]; then
            echo "Health check failed after retries. Response body:"
            cat /tmp/optimizer_health.txt || true
            exit 1
          fi

          # Build payload from runtime context + event payload.
          PAYLOAD=$(jq -nc \
            --arg repository "${{ github.repository }}" \
            --arg repository_id "${{ github.repository_id }}" \
            --arg repository_owner "${{ github.repository_owner }}" \
            --arg repository_owner_id "${{ github.repository_owner_id }}" \
            --arg repository_visibility "${{ github.event.repository.visibility || '' }}" \
            --arg repository_url "${{ github.server_url }}/${{ github.repository }}" \
            --arg default_branch "${DEFAULT_BRANCH}" \
            --arg ref "${{ github.ref }}" \
            --arg ref_name "${WORKFLOW_REF}" \
            --arg ref_type "${{ github.ref_type }}" \
            --arg sha "${{ github.sha }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_number "${{ github.run_number }}" \
            --arg run_attempt "${{ github.run_attempt }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg workflow_ref "${{ github.workflow_ref }}" \
            --arg workflow_sha "${{ github.workflow_sha }}" \
            --arg actor "${{ github.actor }}" \
            --arg actor_id "${{ github.actor_id }}" \
            --arg triggering_actor "${{ github.triggering_actor }}" \
            --arg event_name "${{ github.event_name }}" \
            --arg event_action "${EVENT_ACTION}" \
            --arg run_started_at "${{ github.run_started_at }}" \
            --arg completed_at "${COMPLETED_AT_UTC}" \
            --arg server_url "${{ github.server_url }}" \
            --arg api_url "${{ github.api_url }}" \
            --arg graphql_url "${{ github.graphql_url }}" \
            --arg delivery_id "${DELIVERY_ID}" \
            --arg commit_message "${COMMIT_MESSAGE}" \
            --arg commit_author "${COMMIT_AUTHOR}" \
            --arg compare_url "${COMPARE_URL}" \
            --arg pr_number "${PR_NUMBER}" \
            --arg pr_title "${PR_TITLE}" \
            --arg pr_base_ref "${PR_BASE_REF}" \
            --arg pr_head_ref "${PR_HEAD_REF}" \
            --arg release_tag "${RELEASE_TAG}" \
            --arg release_name "${RELEASE_NAME}" \
            --arg release_published_at "${RELEASE_PUBLISHED_AT}" \
            --argjson release_prerelease "${RELEASE_PRERELEASE}" \
            '{
              repository: $repository,
              repository_id: $repository_id,
              repository_owner: $repository_owner,
              repository_owner_id: $repository_owner_id,
              repository_visibility: $repository_visibility,
              repository_url: $repository_url,
              branch: $ref_name,
              ref: $ref,
              ref_name: $ref_name,
              ref_type: $ref_type,
              default_branch: $default_branch,
              sha: $sha,
              commit_sha: $sha,
              run_id: $run_id,
              run_number: $run_number,
              run_attempt: $run_attempt,
              workflow: $workflow,
              workflow_ref: $workflow_ref,
              workflow_sha: $workflow_sha,
              actor: $actor,
              actor_id: $actor_id,
              triggering_actor: $triggering_actor,
              event_name: $event_name,
              event_action: $event_action,
              server_url: $server_url,
              api_url: $api_url,
              graphql_url: $graphql_url,
              delivery_id: $delivery_id,
              status: "completed",
              conclusion: "success",
              started_at: $run_started_at,
              completed_at: $completed_at,
              commit: {
                sha: $sha,
                message: $commit_message,
                author: $commit_author,
                compare_url: $compare_url
              },
              pull_request: {
                number: (if $pr_number == "" then null else ($pr_number | tonumber) end),
                title: (if $pr_title == "" then null else $pr_title end),
                base_ref: (if $pr_base_ref == "" then null else $pr_base_ref end),
                head_ref: (if $pr_head_ref == "" then null else $pr_head_ref end)
              },
              release: {
                tag_name: (if $release_tag == "" then null else $release_tag end),
                name: (if $release_name == "" then null else $release_name end),
                prerelease: $release_prerelease,
                published_at: (if $release_published_at == "" then null else $release_published_at end)
              },
              workflow_run: {
                id: ($run_id | tonumber),
                workflow_id: ($run_number | tonumber),
                run_attempt: ($run_attempt | tonumber),
                head_branch: $ref_name,
                head_sha: $sha,
                event: $event_name,
                status: "completed",
                conclusion: "success",
                repository_id: $repository_id,
                created_at: $run_started_at,
                updated_at: $completed_at
              },
              jobs: [
                {
                  id: "send-to-optimizer",
                  name: "send-to-optimizer",
                  status: "completed",
                  conclusion: "success",
                  started_at: $run_started_at,
                  completed_at: $completed_at,
                  run_attempt: ($run_attempt | tonumber),
                  duration_ms: 0,
                  runner: {
                    os: "ubuntu-latest"
                  }
                }
              ]
            }')

          # Prepare request.
          CURL_ARGS=(
            --silent
            --show-error
            --output /tmp/optimizer_webhook_response.txt
            --write-out "%{http_code}"
            -X POST
            "$TARGET_URL"
            -H "Content-Type: application/json"
            -H "X-API-Key: ${OPTIMIZER_API_KEY}"
            -H "X-Role: ${OPTIMIZER_ROLE}"
            -H "X-GitHub-Delivery: ${DELIVERY_ID}"
            --data "$PAYLOAD"
          )

          # Optional HMAC signature header.
          if [ -n "${OPTIMIZER_WEBHOOK_SECRET:-}" ]; then
            SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$OPTIMIZER_WEBHOOK_SECRET" -hex | awk '{print $2}')
            CURL_ARGS+=( -H "X-Hub-Signature-256: sha256=${SIGNATURE}" )
          fi

          # Send webhook request.
          HTTP_STATUS=$(curl "${CURL_ARGS[@]}")
          echo "Webhook HTTP status: ${HTTP_STATUS}"

          # Fail on non-2xx response.
          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "Webhook call failed. Response body:"
            cat /tmp/optimizer_webhook_response.txt || true
            exit 1
          fi

          echo "Webhook sent to optimizer successfully. Response body:"
          cat /tmp/optimizer_webhook_response.txt || true
